# Vanni — local dictation config

[hotkeys]
dictate = "ctrl+windows"        # hold to record, release to transcribe+format+inject
dictate_raw = "ctrl+alt+windows" # hold: same but always skips the LLM formatter
# Assist mode: select text anywhere, hold, SPEAK an instruction ("translate to
# English", "make this a bullet list"), release — the transformed text replaces
# the selection. Change here if the chord clashes with an app you use.
assist = "ctrl+alt+space"

[asr]
model = "large-v3-turbo"        # faster-whisper model id; fallbacks tried automatically
compute_type = "int8_float16"
language = "en"                 # set "auto" for multilingual (see README)
# Silero voice-activity detection (bundled with faster-whisper, auto-downloads
# on first use, fully offline). Trims silence before transcription — cheaper
# and less hallucination-prone, especially on low-spec CPU-only machines.
vad = true
# Names/jargon Whisper should be biased toward hearing correctly (fed as
# hotwords, together with your corrections.json targets). Edit any time.
vocabulary = ["Vanni", "Ollama"]

[formatter]
model = "phi3.5"                # Ollama model for cleanup; benchmarked fastest of 5 candidates (~300ms vs qwen3.5:4b's ~1740ms)
fallback_model = "qwen2.5:3b"    # for <8GB VRAM machines; same-family control, non-thinking, ~900ms
# Model for assist-mode transforms (translate/summarize/rewrite). Benchmarked
# 2026-07-04: qwen2.5:3b beat phi3.5 on CJK translation (phi3.5 mistranslated
# ja "Tuesday"->"Wednesday") at equal latency. Defaults to `model` if removed.
assist_model = "qwen2.5:3b"
word_skip_threshold = 10        # utterances under this many words skip the LLM
enabled = true
# -1 keeps the LLM in VRAM forever (fast but holds ~3.2GB). Set "10m" to free
# VRAM when idle — first cleanup after idle then costs a ~5s reload.
keep_alive = -1
# 127.0.0.1, not localhost: Windows tries IPv6 ::1 first and stalls ~2s per call
ollama_url = "http://127.0.0.1:11434"

[audio]
min_seconds = 0.3               # discard shorter recordings (hallucination gate)
# Input device: "" = system default. Pick one from the tray "Microphone" menu
# (which persists your choice here), or set an index/name manually. A wrong
# default mic is the #1 "it recorded nothing" cause — this lets you choose.
device = ""

[history]
# Local dictation log: history/YYYY-MM-DD.md next to the exe — raw transcript,
# corrections that fired, final text. Never leaves this machine; doubles as a
# training corpus for future ML on your own speech patterns.
enabled = true
